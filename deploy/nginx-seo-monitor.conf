server {
    listen 80;
    server_name seo.le-guide-road-trip.fr;

    # Redirect HTTP -> HTTPS (certbot will add this automatically)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name seo.le-guide-road-trip.fr;

    # SSL certs will be added by certbot
    # ssl_certificate /etc/letsencrypt/live/seo.le-guide-road-trip.fr/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/seo.le-guide-road-trip.fr/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
    }
}
